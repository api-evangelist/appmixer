naftiko: 1.0.0-alpha2
info:
  label: Appmixer API — Files
  description: 'Appmixer API — Files. 4 operations. Lead operation: Appmixer List files. Self-contained Naftiko capability
    covering one Appmixer business surface.'
  tags:
  - Appmixer
  - Files
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPMIXER_API_KEY: APPMIXER_API_KEY
capability:
  consumes:
  - type: http
    namespace: appmixer-files
    baseUri: https://api.{tenant}.appmixer.cloud
    description: Appmixer API — Files business capability. Self-contained, no shared references.
    resources:
    - name: files
      path: /files
      operations:
      - name: listfiles
        method: GET
        description: Appmixer List files
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadfile
        method: POST
        description: Appmixer Upload a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: files-fileId
      path: /files/{fileId}
      operations:
      - name: getfile
        method: GET
        description: Appmixer Get a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fileId
          in: path
          type: string
          required: true
      - name: deletefile
        method: DELETE
        description: Appmixer Delete a file
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fileId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.APPMIXER_API_KEY}}'
  exposes:
  - type: rest
    namespace: appmixer-files-rest
    port: 8080
    description: REST adapter for Appmixer API — Files. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/files
      name: files
      description: REST surface for files.
      operations:
      - method: GET
        name: listfiles
        description: Appmixer List files
        call: appmixer-files.listfiles
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: uploadfile
        description: Appmixer Upload a file
        call: appmixer-files.uploadfile
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files/{fileid}
      name: files-fileid
      description: REST surface for files-fileId.
      operations:
      - method: GET
        name: getfile
        description: Appmixer Get a file
        call: appmixer-files.getfile
        with:
          fileId: rest.fileId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefile
        description: Appmixer Delete a file
        call: appmixer-files.deletefile
        with:
          fileId: rest.fileId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appmixer-files-mcp
    port: 9090
    transport: http
    description: MCP adapter for Appmixer API — Files. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appmixer-list-files
      description: Appmixer List files
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appmixer-files.listfiles
      outputParameters:
      - type: object
        mapping: $.
    - name: appmixer-upload-file
      description: Appmixer Upload a file
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appmixer-files.uploadfile
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: appmixer-get-file
      description: Appmixer Get a file
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appmixer-files.getfile
      with:
        fileId: tools.fileId
      outputParameters:
      - type: object
        mapping: $.
    - name: appmixer-delete-file
      description: Appmixer Delete a file
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: appmixer-files.deletefile
      with:
        fileId: tools.fileId
      outputParameters:
      - type: object
        mapping: $.
