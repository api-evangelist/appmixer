naftiko: 1.0.0-alpha2
info:
  label: Appmixer API — Messages
  description: 'Appmixer API — Messages. 3 operations. Lead operation: Appmixer List unprocessed messages. Self-contained
    Naftiko capability covering one Appmixer business surface.'
  tags:
  - Appmixer
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPMIXER_API_KEY: APPMIXER_API_KEY
capability:
  consumes:
  - type: http
    namespace: appmixer-messages
    baseUri: https://api.{tenant}.appmixer.cloud
    description: Appmixer API — Messages business capability. Self-contained, no shared references.
    resources:
    - name: unprocessed-messages
      path: /unprocessed-messages
      operations:
      - name: listunprocessedmessages
        method: GET
        description: Appmixer List unprocessed messages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: unprocessed-messages-messageId
      path: /unprocessed-messages/{messageId}
      operations:
      - name: reprocessmessage
        method: POST
        description: Appmixer Reprocess a message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: messageId
          in: path
          type: string
          required: true
      - name: deleteunprocessedmessage
        method: DELETE
        description: Appmixer Delete an unprocessed message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: messageId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.APPMIXER_API_KEY}}'
  exposes:
  - type: rest
    namespace: appmixer-messages-rest
    port: 8080
    description: REST adapter for Appmixer API — Messages. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/unprocessed-messages
      name: unprocessed-messages
      description: REST surface for unprocessed-messages.
      operations:
      - method: GET
        name: listunprocessedmessages
        description: Appmixer List unprocessed messages
        call: appmixer-messages.listunprocessedmessages
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/unprocessed-messages/{messageid}
      name: unprocessed-messages-messageid
      description: REST surface for unprocessed-messages-messageId.
      operations:
      - method: POST
        name: reprocessmessage
        description: Appmixer Reprocess a message
        call: appmixer-messages.reprocessmessage
        with:
          messageId: rest.messageId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteunprocessedmessage
        description: Appmixer Delete an unprocessed message
        call: appmixer-messages.deleteunprocessedmessage
        with:
          messageId: rest.messageId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appmixer-messages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Appmixer API — Messages. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appmixer-list-unprocessed-messages
      description: Appmixer List unprocessed messages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appmixer-messages.listunprocessedmessages
      outputParameters:
      - type: object
        mapping: $.
    - name: appmixer-reprocess-message
      description: Appmixer Reprocess a message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appmixer-messages.reprocessmessage
      with:
        messageId: tools.messageId
      outputParameters:
      - type: object
        mapping: $.
    - name: appmixer-delete-unprocessed-message
      description: Appmixer Delete an unprocessed message
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: appmixer-messages.deleteunprocessedmessage
      with:
        messageId: tools.messageId
      outputParameters:
      - type: object
        mapping: $.
