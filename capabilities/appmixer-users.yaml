naftiko: 1.0.0-alpha2
info:
  label: Appmixer API — Users
  description: 'Appmixer API — Users. 4 operations. Lead operation: Appmixer Get current user. Self-contained Naftiko capability
    covering one Appmixer business surface.'
  tags:
  - Appmixer
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPMIXER_API_KEY: APPMIXER_API_KEY
capability:
  consumes:
  - type: http
    namespace: appmixer-users
    baseUri: https://api.{tenant}.appmixer.cloud
    description: Appmixer API — Users business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: getcurrentuser
        method: GET
        description: Appmixer Get current user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createuser
        method: POST
        description: Appmixer Create a new user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: updateuser
        method: PUT
        description: Appmixer Update a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Appmixer Delete a user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.APPMIXER_API_KEY}}'
  exposes:
  - type: rest
    namespace: appmixer-users-rest
    port: 8080
    description: REST adapter for Appmixer API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: getcurrentuser
        description: Appmixer Get current user
        call: appmixer-users.getcurrentuser
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Appmixer Create a new user
        call: appmixer-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: PUT
        name: updateuser
        description: Appmixer Update a user
        call: appmixer-users.updateuser
        with:
          userId: rest.userId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Appmixer Delete a user
        call: appmixer-users.deleteuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: appmixer-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Appmixer API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: appmixer-get-current-user
      description: Appmixer Get current user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: appmixer-users.getcurrentuser
      outputParameters:
      - type: object
        mapping: $.
    - name: appmixer-create-new-user
      description: Appmixer Create a new user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: appmixer-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: appmixer-update-user
      description: Appmixer Update a user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: appmixer-users.updateuser
      with:
        userId: tools.userId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: appmixer-delete-user
      description: Appmixer Delete a user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: appmixer-users.deleteuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
