naftiko: 1.0.0-alpha2
info:
  label: Appmixer Embedded Automation
  description: Workflow capability for managing embedded automation within SaaS products using Appmixer. Combines flow lifecycle
    management, user provisioning, data storage, and human-in-the-loop task handling into a unified workflow for SaaS developers
    embedding white-labeled automation into their products.
  tags:
  - Appmixer
  - Automation
  - Embedded iPaaS
  - Workflows
  - SaaS
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    APPMIXER_API_TOKEN: APPMIXER_API_TOKEN
capability:
  consumes:
  - type: http
    namespace: appmixer
    baseUri: https://api.appmixer.com/v1
    description: Appmixer REST API for workflow and integration management
    authentication:
      type: bearer
      token: '{{APPMIXER_API_TOKEN}}'
    resources:
    - name: flows
      path: /flows
      description: Workflow (flow) lifecycle management
      operations:
      - name: list-flows
        method: GET
        description: Returns a list of automation flows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-flow
        method: POST
        description: Creates a new automation flow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
    - name: flow
      path: /flows/{flowId}
      description: Single flow operations
      operations:
      - name: get-flow
        method: GET
        description: Returns a specific automation flow
        inputParameters:
        - name: flowId
          in: path
          type: string
          required: true
          description: Flow identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: start-flow
        method: POST
        description: Starts/runs a flow
        inputParameters:
        - name: flowId
          in: path
          type: string
          required: true
          description: Flow identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users
      path: /users
      description: User management
      operations:
      - name: list-users
        method: GET
        description: Returns a list of Appmixer users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-user
        method: POST
        description: Creates a new Appmixer user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            username: '{{tools.username}}'
            email: '{{tools.email}}'
    - name: data-stores
      path: /data-stores
      description: Data store (key-value storage) management
      operations:
      - name: list-data-stores
        method: GET
        description: Returns a list of data stores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people-tasks
      path: /people-tasks
      description: Human-in-the-loop task management
      operations:
      - name: list-people-tasks
        method: GET
        description: Returns a list of people tasks pending human action
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: complete-task
        method: POST
        description: Completes a people task with a human decision
        inputParameters:
        - name: taskId
          in: path
          type: string
          required: true
          description: Task identifier
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            decision: '{{tools.decision}}'
  exposes:
  - type: rest
    port: 8080
    namespace: embedded-automation-api
    description: Unified REST API for Appmixer embedded automation management.
    resources:
    - path: /v1/flows
      name: flows
      description: Automation flow lifecycle
      operations:
      - method: GET
        name: list-flows
        description: List all automation flows
        call: appmixer.list-flows
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-flow
        description: Create a new automation flow
        call: appmixer.create-flow
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      description: User management for embedded automation
      operations:
      - method: GET
        name: list-users
        description: List automation users
        call: appmixer.list-users
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/tasks
      name: tasks
      description: Human-in-the-loop tasks
      operations:
      - method: GET
        name: list-tasks
        description: List pending people tasks
        call: appmixer.list-people-tasks
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: embedded-automation-mcp
    transport: http
    description: MCP server for AI-assisted automation management in Appmixer.
    tools:
    - name: list-automation-flows
      description: Lists all automation workflows configured in Appmixer
      hints:
        readOnly: true
        idempotent: true
      call: appmixer.list-flows
      outputParameters:
      - type: object
        mapping: $.
    - name: create-automation-flow
      description: Creates a new automation flow in Appmixer for embedding in a product
      hints:
        readOnly: false
        destructive: false
      call: appmixer.create-flow
      with:
        name: tools.name
      outputParameters:
      - type: object
        mapping: $.
    - name: run-automation-flow
      description: Starts/runs an automation flow to execute its workflow
      hints:
        readOnly: false
        destructive: false
      call: appmixer.start-flow
      with:
        flowId: tools.flowId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-pending-tasks
      description: Lists human-in-the-loop tasks waiting for user review or approval
      hints:
        readOnly: true
        idempotent: true
      call: appmixer.list-people-tasks
      outputParameters:
      - type: object
        mapping: $.
    - name: approve-task
      description: Approves or completes a pending human-in-the-loop task in an automation flow
      hints:
        readOnly: false
        destructive: false
      call: appmixer.complete-task
      with:
        taskId: tools.taskId
        decision: tools.decision
      outputParameters:
      - type: object
        mapping: $.
    - name: list-automation-users
      description: Lists users who have access to the embedded automation platform
      hints:
        readOnly: true
        idempotent: true
      call: appmixer.list-users
      outputParameters:
      - type: object
        mapping: $.
